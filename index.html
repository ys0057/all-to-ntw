<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊換匯計算機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1923;
    --card: #1a2a3a;
    --card-border: #2a3f55;
    --accent-card: #e74c3c;
    --accent-cash: #2ecc71;
    --accent-blue: #3498db;
    --text: #e8edf2;
    --text-dim: #7f95a8;
    --input-bg: #0d1520;
    --input-border: #2a3f55;
    --input-focus: #3498db;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 3rem;
  }

  header { text-align: center; margin-bottom: 1rem; }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 0.25rem; }
  #updateTime { font-size: 0.72rem; color: var(--text-dim); }

  .container { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 0.9rem; }

  /* ── Currency Select ── */
  .currency-select-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 0.8rem 1rem;
  }
  .currency-select-label {
    display: block;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 0.45rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .select-row {
    position: relative;
    display: flex;
    align-items: center;
  }
  .currency-select {
    font-family: 'Noto Sans TC', sans-serif;
    width: 100%;
    min-height: 2.8rem;
    appearance: none;
    -webkit-appearance: none;
    padding: 0.65rem 2.4rem 0.65rem 0.8rem;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: var(--input-bg);
    color: var(--text);
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .currency-select:focus {
    border-color: var(--accent-blue);
  }
  .select-arrow {
    position: absolute;
    right: 0.85rem;
    color: var(--text-dim);
    pointer-events: none;
    font-size: 0.78rem;
  }

  /* ── Amount Input ── */
  .input-group {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1rem 1.1rem;
  }
  .input-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 0.45rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .input-row { display: flex; align-items: center; gap: 0.6rem; }

  .currency-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text-dim);
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    padding: 0.6rem 0.65rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  input[type="number"], input[type="text"] {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 1.2rem;
    color: var(--text);
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"]:focus, input[type="text"]:focus { border-color: var(--input-focus); }

  /* ── Rate + Result Grid ── */
  .rr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

  .rr-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 0.65rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }
  .rr-box.card-side { border-left: 3px solid var(--accent-card); }
  .rr-box.cash-side { border-left: 3px solid var(--accent-cash); }

  .rr-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.1rem;
  }
  .rr-label { font-size: 0.68rem; font-weight: 600; color: var(--text-dim); }

  /* Mode Toggle */
  .mode-toggle {
    display: flex;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--card-border);
    flex-shrink: 0;
  }
  .mode-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.52rem;
    font-weight: 600;
    padding: 0.12rem 0.32rem;
    background: transparent;
    color: var(--text-dim);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.3;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-btn.active { background: var(--accent-blue); color: #fff; }

  .rr-rate {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    opacity: 0.8;
  }

  .rr-fee {
    font-size: 0.56rem;
    color: var(--text-dim);
    opacity: 0.55;
    display: flex;
    align-items: center;
    gap: 0.1rem;
  }
  .rr-fee input {
    font-family: 'DM Mono', monospace;
    font-size: 0.56rem;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 3px;
    width: 2.4rem;
    padding: 0.08rem 0.15rem;
    outline: none;
    text-align: center;
    transition: all 0.2s;
    -moz-appearance: textfield;
  }
  .rr-fee input:focus {
    background: var(--input-bg);
    border-color: var(--accent-card);
    color: var(--text);
    opacity: 1;
  }

  .rr-rate-edit {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    opacity: 0.8;
  }
  .rr-rate-edit input {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    width: 5.2rem;
    padding: 0.12rem 0.2rem;
    outline: none;
    transition: all 0.2s;
    -moz-appearance: textfield;
  }
  .rr-rate-edit input:focus {
    background: var(--input-bg);
    border-color: var(--accent-blue);
    color: var(--text);
    opacity: 1;
  }
  .card-side .rr-rate-edit input:focus { border-color: var(--accent-card); }
  .cash-side .rr-rate-edit input:focus { border-color: var(--accent-cash); }

  .rr-sub { font-size: 0.56rem; color: var(--text-dim); opacity: 0.45; }
  .rr-divider { height: 1px; background: var(--card-border); margin: 0.15rem 0; }

  /* [FIX #7] 僅在有意義時才動畫；prefers-reduced-motion 完全關閉 */
  .rr-result {
    font-family: 'DM Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.15;
    transition: transform 0.15s ease;
  }
  .rr-result.pop { transform: scale(1.06); }
  .card-side .rr-result { color: var(--accent-card); }
  .cash-side .rr-result { color: var(--accent-cash); }

  .rr-unit { font-size: 0.62rem; color: var(--text-dim); }

  .diff-note {
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-dim);
    min-height: 1.2em;
  }
  .diff-note span { color: var(--accent-cash); font-weight: 600; }

  /* Note Input */
  .note-input {
    font-family: 'Noto Sans TC', sans-serif !important;
    font-size: 0.82rem !important;
    background: var(--card) !important;
    border: 1px solid var(--card-border) !important;
    border-radius: 10px !important;
    padding: 0.55rem 0.9rem !important;
  }
  .note-input::placeholder { color: var(--text-dim); opacity: 0.45; }
  .note-input:focus { border-color: var(--accent-blue) !important; }

  /* Action Buttons */
  .action-row { display: flex; gap: 0.6rem; }

  .btn {
    flex: 1;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.7rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-add { background: var(--accent-blue); color: #fff; }
  .btn-add:active { background: #2980b9; }
  .btn-reset {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
  }
  .btn-reset:active { background: rgba(231,76,60,0.15); color: var(--accent-card); border-color: var(--accent-card); }

  /* Summary */
  .summary-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1rem 1.1rem;
  }
  .summary-title {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .summary-item { text-align: center; }
  .summary-label { font-size: 0.66rem; color: var(--text-dim); margin-bottom: 0.2rem; }
  .summary-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 600;
    transition: transform 0.15s;
  }
  .summary-value.card-color { color: var(--accent-card); }
  .summary-value.cash-color { color: var(--accent-cash); }
  .summary-count {
    text-align: center;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--card-border);
  }

  /* ── History ── */
  .history-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.1rem;
    border-bottom: 1px solid var(--card-border);
  }
  .history-title {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .btn-clear-history {
    font-size: 0.66rem;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-clear-history:active { color: var(--accent-card); }

  .history-list { max-height: 300px; overflow-y: auto; }

  /* [FIX #6] grid layout 避免 overflow，三欄各取所需 */
  .history-item {
    display: grid;
    grid-template-columns: minmax(0, auto) 1fr auto auto;
    align-items: center;
    padding: 0.55rem 0.5rem 0.55rem 1.1rem;
    border-bottom: 1px solid rgba(42,63,85,0.5);
    gap: 0.35rem;
  }
  .history-item:last-child { border-bottom: none; }

  .history-left {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    min-width: 0;
    overflow: hidden;
  }
  .history-from {
    font-family: 'DM Mono', monospace;
    font-size: 0.74rem;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .history-note {
    font-size: 0.6rem;
    color: var(--accent-blue);
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-twd {
    display: flex;
    flex-wrap: wrap;
    gap: 0.25rem 0.35rem;
    justify-content: flex-end;
    min-width: 0;
  }
  .history-card-val { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent-card); white-space: nowrap; }
  .history-cash-val { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent-cash); white-space: nowrap; }
  .history-time { font-size: 0.56rem; color: var(--text-dim); opacity: 0.6; white-space: nowrap; }

  .history-del {
    font-size: 0.7rem;
    color: var(--text-dim);
    opacity: 0.3;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .history-del:active { opacity: 1; color: var(--accent-card); }

  .history-empty {
    padding: 1.4rem;
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-dim);
    opacity: 0.5;
  }

  footer { margin-top: 2rem; font-size: 0.65rem; color: var(--text-dim); text-align: center; opacity: 0.5; line-height: 1.6; }

  @media (hover: hover) {
    .history-del:hover { opacity: 1; color: var(--accent-card); }
  }

  @media (max-width: 360px) {
    body { padding-inline: 0.75rem; }
    .rr-grid,
    .summary-grid { grid-template-columns: 1fr; }
    .action-row { flex-direction: column; }
    .history-item { grid-template-columns: minmax(0, 1fr) auto; }
    .history-twd {
      grid-column: 1 / -1;
      justify-content: flex-start;
    }
  }

  /* [FIX #7] prefers-reduced-motion：停用所有位移動畫 */
  @media (prefers-reduced-motion: reduce) {
    .rr-result, .summary-value { transition: none; }
    .rr-result.pop { transform: none; }
  }
</style>
</head>
<body>

<header>
  <h1>旅遊換匯計算機</h1>
  <p id="updateTime">載入匯率中⋯</p>
</header>

<div class="container">

  <div class="currency-select-card">
    <label class="currency-select-label" for="currencySelect">選擇國家 / 貨幣</label>
    <div class="select-row">
      <select class="currency-select" id="currencySelect" aria-label="選擇國家與貨幣"></select>
      <span class="select-arrow" aria-hidden="true">▼</span>
    </div>
  </div>

  <div class="input-group">
    <label id="inputLabel" for="amount">韓幣金額 (₩)</label>
    <div class="input-row">
      <span class="currency-tag" id="currencyTag" aria-hidden="true">₩ KRW</span>
      <!-- [FIX #5] min="0" step="any" inputmode="decimal" -->
      <input type="number" id="amount" placeholder="例: 15000"
             inputmode="decimal" min="0" step="any" aria-label="輸入金額">
    </div>
  </div>

  <!-- Rate + Result -->
  <div class="rr-grid">
    <!-- Card -->
    <div class="rr-box card-side">
      <div class="rr-label-row">
        <span class="rr-label">💳 刷卡</span>
        <div class="mode-toggle" id="cardModeToggle" data-target="card">
          <button class="mode-btn active" data-mode="auto" type="button">自動</button>
          <button class="mode-btn" data-mode="manual" type="button">手動</button>
        </div>
      </div>
      <div id="cardAutoSection">
        <div class="rr-rate" id="cardRateDisplay">× —</div>
        <div class="rr-fee">含 <input type="number" id="cardFee" value="1.5" step="0.1" min="0" max="10" aria-label="刷卡手續費百分比">% 手續費</div>
      </div>
      <div id="cardManualSection" style="display:none">
        <div class="rr-rate-edit">× <input type="number" id="cardManualInput" step="any" min="0" aria-label="手動刷卡匯率"></div>
        <div class="rr-sub">可自訂匯率</div>
      </div>
      <div class="rr-divider"></div>
      <div class="rr-result" id="cardResult">—</div>
      <div class="rr-unit">新台幣 TWD</div>
    </div>
    <!-- Cash -->
    <div class="rr-box cash-side">
      <div class="rr-label-row">
        <span class="rr-label">💵 現金</span>
        <div class="mode-toggle" id="cashModeToggle" data-target="cash">
          <button class="mode-btn" data-mode="auto" type="button">自動</button>
          <button class="mode-btn active" data-mode="manual" type="button">手動</button>
        </div>
      </div>
      <div id="cashAutoSection" style="display:none">
        <div class="rr-rate" id="cashAutoRateDisplay">× —</div>
        <div class="rr-sub">即時中間價</div>
      </div>
      <div id="cashManualSection">
        <div class="rr-rate-edit">× <input type="number" id="cashManualInput" step="any" min="0" aria-label="手動現金匯率"></div>
        <div class="rr-sub">可自訂匯率</div>
      </div>
      <div class="rr-divider"></div>
      <div class="rr-result" id="cashResult">—</div>
      <div class="rr-unit">新台幣 TWD</div>
    </div>
  </div>

  <div class="diff-note" id="diffNote" aria-live="polite"></div>

  <!-- Note + Actions -->
  <input type="text" id="noteInput" class="note-input"
         placeholder="備註（選填）例：晚餐、交通、紀念品" maxlength="20" aria-label="備註">

  <div class="action-row">
    <button class="btn btn-add" id="btnAdd" type="button">＋ 加入統計</button>
    <!-- [FIX #8] 僅清空統計，不動設定 → 改名「清空統計」 -->
    <button class="btn btn-reset" id="btnReset" type="button">清空統計</button>
  </div>

  <!-- Summary -->
  <div class="summary-box">
    <div class="summary-title">📊 加總統計</div>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">💳 刷卡總計</div>
        <div class="summary-value card-color" id="totalCard">NT$ 0</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">💵 現金總計</div>
        <div class="summary-value cash-color" id="totalCash">NT$ 0</div>
      </div>
    </div>
    <div class="summary-count" id="summaryCount">尚未加入任何項目</div>
  </div>

  <!-- History -->
  <div class="history-box">
    <div class="history-header">
      <span class="history-title">🕘 歷史紀錄</span>
      <button class="btn-clear-history" id="btnClearHistory" type="button">清除全部</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">尚無紀錄</div>
    </div>
  </div>

</div>

<footer>旅遊換匯計算機 · 匯率來源 fxapi.app · 僅供參考</footer>

<script>
var CURRENCIES = {
  KRW: { country: '韓國',     name: '韓幣',       symbol: '₩',   flag: '🇰🇷', defaultCash: 0.02310, placeholder: '15000' },
  JPY: { country: '日本',     name: '日幣',       symbol: '¥',   flag: '🇯🇵', defaultCash: 0.2200,  placeholder: '1000' },
  USD: { country: '美國',     name: '美金',       symbol: '$',   flag: '🇺🇸', defaultCash: 32.00,   placeholder: '100' },
  CNY: { country: '中國',     name: '人民幣',     symbol: '¥',   flag: '🇨🇳', defaultCash: 4.45,    placeholder: '100' },
  HKD: { country: '香港',     name: '港幣',       symbol: 'HK$', flag: '🇭🇰', defaultCash: 4.10,    placeholder: '100' },
  MOP: { country: '澳門',     name: '澳門幣',     symbol: 'MOP$',flag: '🇲🇴', defaultCash: 4.00,    placeholder: '100' },
  SGD: { country: '新加坡',   name: '新幣',       symbol: 'S$',  flag: '🇸🇬', defaultCash: 24.00,   placeholder: '100' },
  MYR: { country: '馬來西亞', name: '令吉',       symbol: 'RM',  flag: '🇲🇾', defaultCash: 7.00,    placeholder: '100' },
  THB: { country: '泰國',     name: '泰銖',       symbol: '฿',   flag: '🇹🇭', defaultCash: 0.92,    placeholder: '1000' },
  VND: { country: '越南',     name: '越南盾',     symbol: '₫',   flag: '🇻🇳', defaultCash: 0.00130, placeholder: '100000' },
  PHP: { country: '菲律賓',   name: '披索',       symbol: '₱',   flag: '🇵🇭', defaultCash: 0.56,    placeholder: '1000' },
  IDR: { country: '印尼',     name: '印尼盾',     symbol: 'Rp',  flag: '🇮🇩', defaultCash: 0.0020,  placeholder: '100000' },
  EUR: { country: '歐元區',   name: '歐元',       symbol: '€',   flag: '🇪🇺', defaultCash: 35.50,   placeholder: '100' },
  GBP: { country: '英國',     name: '英鎊',       symbol: '£',   flag: '🇬🇧', defaultCash: 41.00,   placeholder: '100' },
  CHF: { country: '瑞士',     name: '瑞士法郎',   symbol: 'CHF', flag: '🇨🇭', defaultCash: 36.00,   placeholder: '100' },
  CZK: { country: '捷克',     name: '捷克克朗',   symbol: 'Kč',  flag: '🇨🇿', defaultCash: 1.50,    placeholder: '1000' },
  AUD: { country: '澳洲',     name: '澳幣',       symbol: 'A$',  flag: '🇦🇺', defaultCash: 21.00,   placeholder: '100' },
  NZD: { country: '紐西蘭',   name: '紐幣',       symbol: 'NZ$', flag: '🇳🇿', defaultCash: 19.00,   placeholder: '100' },
  CAD: { country: '加拿大',   name: '加幣',       symbol: 'C$',  flag: '🇨🇦', defaultCash: 23.50,   placeholder: '100' },
  AED: { country: '阿聯酋',   name: '迪拉姆',     symbol: 'د.إ', flag: '🇦🇪', defaultCash: 8.70,    placeholder: '100' },
  TRY: { country: '土耳其',   name: '土耳其里拉', symbol: '₺',   flag: '🇹🇷', defaultCash: 1.00,    placeholder: '1000' }
};

var FALLBACK_API = {
  KRW: 47.77, JPY: 5.07, USD: 0.0318, CNY: 0.225, HKD: 0.244, MOP: 0.25, SGD: 0.0417,
  MYR: 0.143, THB: 1.08, VND: 819.67, PHP: 1.79, IDR: 500, EUR: 0.0294, GBP: 0.0244,
  CHF: 0.0278, CZK: 0.73, AUD: 0.0476, NZD: 0.0526, CAD: 0.0426, AED: 0.115, TRY: 1.00
};

function $(id) { return document.getElementById(id); }

var updateTimeEl        = $('updateTime');
var currencySelectEl    = $('currencySelect');
var inputLabelEl        = $('inputLabel');
var currencyTagEl       = $('currencyTag');
var amountInput         = $('amount');
var cardRateDisplay     = $('cardRateDisplay');
var cardFeeInput        = $('cardFee');
var cardManualInput     = $('cardManualInput');
var cashAutoRateDisplay = $('cashAutoRateDisplay');
var cashManualInput     = $('cashManualInput');
var cardResultEl        = $('cardResult');
var cashResultEl        = $('cashResult');
var diffNoteEl          = $('diffNote');
var noteInput           = $('noteInput');
var totalCardEl         = $('totalCard');
var totalCashEl         = $('totalCash');
var summaryCountEl      = $('summaryCount');
var historyListEl       = $('historyList');

// ── State — restore from localStorage ──
var activeCurrency, manualCashRates, manualCardRates, cardModes, cashModes, cardFee;
var historyLog, totalCard, totalCash;

try {
  activeCurrency  = localStorage.getItem('activeCurrency') || 'KRW';
  // [FIX #1] 驗證 activeCurrency 是否為合法幣別
  if (!CURRENCIES[activeCurrency]) activeCurrency = 'KRW';

  manualCashRates = JSON.parse(localStorage.getItem('manualCashRates') || '{}');
  manualCardRates = JSON.parse(localStorage.getItem('manualCardRates') || '{}');
  cardModes       = JSON.parse(localStorage.getItem('cardModes') || '{}');
  cashModes       = JSON.parse(localStorage.getItem('cashModes') || '{}');
  cardFee         = parseFloat(localStorage.getItem('cardFee'));
  if (isNaN(cardFee)) cardFee = 1.5;
  cardFee = clamp(cardFee, 0, 10);

  // [FIX #3] 歷史紀錄與加總持久化
  historyLog = JSON.parse(localStorage.getItem('historyLog') || '[]');
  historyLog = sanitizeHistory(historyLog);
  totalCard  = sumHistory(historyLog, 'card');
  totalCash  = sumHistory(historyLog, 'cash');
} catch (e) {
  activeCurrency = 'KRW';
  manualCashRates = {}; manualCardRates = {};
  cardModes = {}; cashModes = {}; cardFee = 1.5;
  historyLog = []; totalCard = 0; totalCash = 0;
}

var apiRates = null;
var currentCard = 0, currentCash = 0;

function save(k, v) {
  try { localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v)); } catch(e) {}
}

function saveHistory() {
  historyLog = sanitizeHistory(historyLog);
  totalCard = sumHistory(historyLog, 'card');
  totalCash = sumHistory(historyLog, 'cash');
  save('historyLog', historyLog);
  save('totalCard', String(totalCard));
  save('totalCash', String(totalCash));
}

function clamp(n, min, max) {
  if (!isFinite(n)) return min;
  return Math.min(max, Math.max(min, n));
}

function safeNumber(n) {
  n = parseFloat(n);
  return isFinite(n) && n > 0 ? n : 0;
}

function safeText(s) {
  return typeof s === 'string' ? s : '';
}

function sanitizeHistory(items) {
  if (!Array.isArray(items)) return [];
  return items.map(function(item) {
    item = item && typeof item === 'object' ? item : {};
    var code = CURRENCIES[item.code] ? item.code : 'KRW';
    var c = CURRENCIES[code];
    return {
      code: code,
      flag: c.flag,
      symbol: c.symbol,
      amount: safeNumber(item.amount),
      card: safeNumber(item.card),
      cash: safeNumber(item.cash),
      time: safeText(item.time).slice(0, 5),
      note: safeText(item.note).slice(0, 20)
    };
  }).filter(function(item) {
    return item.amount > 0 && item.card > 0 && item.cash > 0;
  });
}

function sumHistory(items, key) {
  return sanitizeHistory(items).reduce(function(sum, item) {
    return sum + safeNumber(item[key]);
  }, 0);
}

function fmt(n) {
  if (!n) return '—';
  return n.toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
}

function fmtRate(r) {
  if (!r) return '—';
  if (r >= 100)  return r.toFixed(1);
  if (r >= 10)   return r.toFixed(2);
  if (r >= 1)    return r.toFixed(3);
  if (r >= 0.01) return r.toFixed(4);
  return r.toFixed(5);
}

// [FIX #7] 動畫只在明確觸發時執行（非每次輸入）
var reducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function popAnim(el) {
  if (reducedMotion) return;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(function() { el.classList.remove('pop'); }, 180);
}

function getApiRate(code) { return (apiRates && apiRates[code]) || FALLBACK_API[code] || 1; }
function getCardMode(code) { return cardModes[code] || 'auto'; }
function getCashMode(code) { return cashModes[code] || 'manual'; }
function autoCardRate(code) { return (1 / getApiRate(code)) * (1 + cardFee / 100); }
function autoCashRate(code) { return 1 / getApiRate(code); }

function getActiveCardRate(code) {
  if (getCardMode(code) === 'manual') {
    return manualCardRates[code] != null ? manualCardRates[code] : autoCardRate(code);
  }
  return autoCardRate(code);
}

function getActiveCashRate(code) {
  if (getCashMode(code) === 'auto') return autoCashRate(code);
  return manualCashRates[code] != null ? manualCashRates[code] : (CURRENCIES[code] ? CURRENCIES[code].defaultCash : 0);
}

// ── [FIX #2] API fetch：檢查 response.ok、data.rates；快取上次成功匯率 ──
function fetchRates() {
  fetch('https://fxapi.app/api/TWD.json')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      if (!data || typeof data.rates !== 'object') throw new Error('invalid payload');
      apiRates = data.rates;
      save('cachedRates', data.rates);
      save('cachedRatesTime', data.timestamp || new Date().toISOString());
      var ts = new Date(data.timestamp || Date.now());
      updateTimeEl.textContent = '匯率更新: ' + ts.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
      refreshRateDisplay();
      calculate(false);
    })
    .catch(function() {
      try {
        var cached = JSON.parse(localStorage.getItem('cachedRates'));
        var cachedTime = localStorage.getItem('cachedRatesTime');
        if (cached && typeof cached === 'object') {
          apiRates = cached;
          var ts = cachedTime ? new Date(cachedTime) : null;
          var timeStr = ts ? ts.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
          updateTimeEl.textContent = '⚠️ 離線，快取匯率（' + timeStr + '）';
        } else {
          apiRates = null;
          updateTimeEl.textContent = '⚠️ 離線模式，使用預設匯率';
        }
      } catch(e) {
        apiRates = null;
        updateTimeEl.textContent = '⚠️ 離線模式，使用預設匯率';
      }
      refreshRateDisplay();
      calculate(false);
    });
}

function renderCurrencyOptions() {
  currencySelectEl.innerHTML = '';
  var codes = Object.keys(CURRENCIES);
  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    var c = CURRENCIES[code];
    var option = document.createElement('option');
    option.value = code;
    option.textContent = c.flag + ' ' + c.country + ' / ' + c.name + ' (' + code + ')';
    currencySelectEl.appendChild(option);
  }
  currencySelectEl.value = activeCurrency;
}

function switchCurrency(code) {
  if (code === activeCurrency) return;
  activeCurrency = code;
  save('activeCurrency', code);
  amountInput.value = '';
  noteInput.value = '';
  currentCard = 0; currentCash = 0;
  cardResultEl.textContent = '—';
  cashResultEl.textContent = '—';
  diffNoteEl.innerHTML = '';
  refreshCurrencyUI();
  currencySelectEl.value = activeCurrency;
}

function refreshCurrencyUI() {
  var c = CURRENCIES[activeCurrency];
  inputLabelEl.textContent = c.country + ' ' + c.name + '金額 (' + c.symbol + ')';
  currencyTagEl.textContent = c.symbol + ' ' + activeCurrency;
  amountInput.placeholder = '例: ' + c.placeholder;
  refreshModeUI();
  refreshRateDisplay();
}

function setMode(target, mode) {
  var code = activeCurrency;
  if (target === 'card') {
    if (mode === 'manual' && manualCardRates[code] == null) {
      manualCardRates[code] = parseFloat(autoCardRate(code).toFixed(6));
      save('manualCardRates', manualCardRates);
    }
    cardModes[code] = mode;
    save('cardModes', cardModes);
  } else {
    if (mode === 'manual' && manualCashRates[code] == null) {
      manualCashRates[code] = CURRENCIES[code].defaultCash;
      save('manualCashRates', manualCashRates);
    }
    cashModes[code] = mode;
    save('cashModes', cashModes);
  }
  refreshModeUI();
  refreshRateDisplay();
  calculate(false);
}

function refreshModeUI() {
  var cm = getCardMode(activeCurrency);
  var sm = getCashMode(activeCurrency);

  $('cardModeToggle').querySelectorAll('.mode-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.mode === cm);
  });
  $('cashModeToggle').querySelectorAll('.mode-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.mode === sm);
  });

  $('cardAutoSection').style.display  = cm === 'auto'   ? '' : 'none';
  $('cardManualSection').style.display = cm === 'manual' ? '' : 'none';
  $('cashAutoSection').style.display   = sm === 'auto'   ? '' : 'none';
  $('cashManualSection').style.display  = sm === 'manual' ? '' : 'none';
}

function refreshRateDisplay() {
  var code = activeCurrency;
  var cm = getCardMode(code);
  var sm = getCashMode(code);

  if (cm === 'auto') {
    cardRateDisplay.textContent = '× ' + fmtRate(autoCardRate(code));
    cardFeeInput.value = cardFee;
  } else {
    var mcr = manualCardRates[code] != null ? manualCardRates[code] : autoCardRate(code);
    cardManualInput.value = fmtRate(mcr);
  }

  if (sm === 'auto') {
    cashAutoRateDisplay.textContent = '× ' + fmtRate(autoCashRate(code));
  } else {
    var msr = manualCashRates[code] != null ? manualCashRates[code] : CURRENCIES[code].defaultCash;
    cashManualInput.value = fmtRate(msr);
  }
}

// [FIX #7] animate 參數控制是否觸發 pop 動畫
function calculate(animate) {
  var val = parseFloat(amountInput.value) || 0;
  // [FIX #5] 防止負數計算（input min=0 攔截大多數情況，JS 再防一層）
  if (val < 0) val = 0;
  var cr = getActiveCardRate(activeCurrency);
  var ca = getActiveCashRate(activeCurrency);

  currentCard = val * cr;
  currentCash = val * ca;

  cardResultEl.textContent = val ? fmt(currentCard) : '—';
  cashResultEl.textContent = val ? fmt(currentCash) : '—';

  if (val && cr && ca) {
    var diff = Math.abs(currentCard - currentCash);
    var cheaper = currentCard < currentCash ? '刷卡' : '現金';
    diffNoteEl.innerHTML = cheaper + '較便宜，省 <span>NT$ ' + fmt(diff) + '</span>';
  } else {
    diffNoteEl.innerHTML = '';
  }

  if (animate) {
    popAnim(cardResultEl);
    popAnim(cashResultEl);
  }
}

function addToTotal() {
  var val = parseFloat(amountInput.value) || 0;
  if (val <= 0) return;

  totalCard += currentCard;
  totalCash += currentCash;

  var now = new Date();
  var timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  var c = CURRENCIES[activeCurrency];
  var note = noteInput.value.trim();

  historyLog.unshift({
    code: activeCurrency, flag: c.flag, symbol: c.symbol,
    amount: val, card: currentCard, cash: currentCash,
    time: timeStr, note: note
  });

  noteInput.value = '';
  saveHistory();
  updateSummary();
  renderHistory();

  // [FIX #7] 加入統計才觸發動畫，非輸入時
  popAnim(cardResultEl);
  popAnim(cashResultEl);
  if (!reducedMotion) {
    totalCardEl.style.transform = 'scale(1.08)';
    totalCashEl.style.transform = 'scale(1.08)';
    setTimeout(function() { totalCardEl.style.transform = ''; totalCashEl.style.transform = ''; }, 200);
  }
}

function deleteHistoryItem(index) {
  var item = historyLog[index];
  totalCard -= item.card;
  totalCash -= item.cash;
  if (totalCard < 0) totalCard = 0;
  if (totalCash < 0) totalCash = 0;
  historyLog.splice(index, 1);
  saveHistory();
  updateSummary();
  renderHistory();
}

function updateSummary() {
  totalCardEl.textContent = 'NT$ ' + (totalCard ? fmt(totalCard) : '0');
  totalCashEl.textContent = 'NT$ ' + (totalCash ? fmt(totalCash) : '0');
  summaryCountEl.textContent = historyLog.length ? '共 ' + historyLog.length + ' 筆' : '尚未加入任何項目';
}

function renderHistory() {
  if (!historyLog.length) {
    historyListEl.innerHTML = '<div class="history-empty">尚無紀錄</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < historyLog.length; i++) {
    var h = historyLog[i];
    var noteHtml = h.note ? '<span class="history-note">' + escHtml(h.note) + '</span>' : '';
    html +=
      '<div class="history-item">' +
        '<div class="history-left">' +
          '<span class="history-from">' + escHtml(h.flag) + ' ' + escHtml(h.symbol) + fmt(h.amount) + '</span>' +
          noteHtml +
        '</div>' +
        '<div class="history-twd">' +
          '<span class="history-card-val">💳 ' + fmt(h.card) + '</span>' +
          '<span class="history-cash-val">💵 ' + fmt(h.cash) + '</span>' +
        '</div>' +
        '<span class="history-time">' + escHtml(h.time) + '</span>' +
        '<button class="history-del" type="button" data-idx="' + i + '" aria-label="刪除此筆">✕</button>' +
      '</div>';
  }
  historyListEl.innerHTML = html;
  historyListEl.querySelectorAll('.history-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      deleteHistoryItem(parseInt(this.dataset.idx));
    });
  });
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function clearHistory() {
  historyLog = []; totalCard = 0; totalCash = 0;
  saveHistory();
  updateSummary();
  renderHistory();
}

// [FIX #8] 僅清空輸入 + 統計，設定（匯率模式、手續費等）不動
function resetStats() {
  amountInput.value = '';
  noteInput.value = '';
  currentCard = 0; currentCash = 0;
  cardResultEl.textContent = '—';
  cashResultEl.textContent = '—';
  diffNoteEl.innerHTML = '';
  clearHistory();
}

// ── Event listeners ──
currencySelectEl.addEventListener('change', function() {
  switchCurrency(currencySelectEl.value);
});

amountInput.addEventListener('input', function() { calculate(false); });

cardManualInput.addEventListener('input', function() {
  var v = parseFloat(cardManualInput.value);
  if (v > 0) {
    manualCardRates[activeCurrency] = v;
    save('manualCardRates', manualCardRates);
    calculate(false);
  }
});

cashManualInput.addEventListener('input', function() {
  var v = parseFloat(cashManualInput.value);
  if (v > 0) {
    manualCashRates[activeCurrency] = v;
    save('manualCashRates', manualCashRates);
    calculate(false);
  }
});

cardFeeInput.addEventListener('input', function() {
  var v = parseFloat(cardFeeInput.value);
  cardFee = clamp(isNaN(v) ? 0 : v, 0, 10);
  if (!isNaN(v) && v !== cardFee) cardFeeInput.value = cardFee;
  save('cardFee', String(cardFee));
  if (getCardMode(activeCurrency) === 'auto') {
    cardRateDisplay.textContent = '× ' + fmtRate(autoCardRate(activeCurrency));
  }
  calculate(false);
});

document.querySelectorAll('.mode-toggle').forEach(function(toggle) {
  toggle.addEventListener('click', function(e) {
    var btn = e.target.closest('.mode-btn');
    if (!btn) return;
    setMode(toggle.dataset.target, btn.dataset.mode);
  });
});

$('btnAdd').addEventListener('click', addToTotal);
$('btnReset').addEventListener('click', resetStats);
$('btnClearHistory').addEventListener('click', clearHistory);

// ── Init ──
renderCurrencyOptions();
refreshCurrencyUI();
updateSummary();
renderHistory();
fetchRates();
</script>

</body>
</html>
