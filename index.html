<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊換匯計算機</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1923;
    --card: #1a2a3a;
    --card-border: #2a3f55;
    --accent-card: #e74c3c;
    --accent-cash: #2ecc71;
    --accent-blue: #3498db;
    --text: #e8edf2;
    --text-dim: #7f95a8;
    --input-bg: #0d1520;
    --input-border: #2a3f55;
    --input-focus: #3498db;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 3rem;
  }

  header { text-align: center; margin-bottom: 1rem; }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 0.25rem; }
  #updateTime { font-size: 0.72rem; color: var(--text-dim); }

  .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 0.9rem; }

  /* Currency Tabs */
  .currency-tabs {
    display: flex;
    gap: 0.35rem;
    overflow-x: auto;
    padding-bottom: 0.2rem;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .currency-tabs::-webkit-scrollbar { display: none; }

  .currency-tab {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.5rem 0.65rem;
    border-radius: 9px;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text-dim);
    font-size: 0.74rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .currency-tab:active { transform: scale(0.96); }
  .currency-tab.active {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
  }
  .currency-tab .tab-name {
    font-size: 0.6rem;
    font-weight: 400;
    opacity: 0.75;
  }
  .currency-tab.active .tab-name { opacity: 0.9; }

  /* Amount Input */
  .input-group {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1rem 1.1rem;
  }
  .input-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 0.45rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .input-row { display: flex; align-items: center; gap: 0.6rem; }

  .currency-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text-dim);
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    padding: 0.6rem 0.65rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  input[type="number"], input[type="text"] {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 1.2rem;
    color: var(--text);
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"]:focus, input[type="text"]:focus { border-color: var(--input-focus); }

  /* Rate + Result Grid */
  .rr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

  .rr-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 0.65rem 0.75rem;
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
  }
  .rr-box.card-side { border-left: 3px solid var(--accent-card); }
  .rr-box.cash-side { border-left: 3px solid var(--accent-cash); }

  .rr-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.1rem;
  }
  .rr-label { font-size: 0.68rem; font-weight: 600; color: var(--text-dim); }

  /* Mode Toggle */
  .mode-toggle {
    display: flex;
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid var(--card-border);
    flex-shrink: 0;
  }
  .mode-btn {
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.52rem;
    font-weight: 600;
    padding: 0.12rem 0.32rem;
    background: transparent;
    color: var(--text-dim);
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.3;
    -webkit-tap-highlight-color: transparent;
  }
  .mode-btn.active {
    background: var(--accent-blue);
    color: #fff;
  }

  .rr-rate {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    opacity: 0.8;
  }

  .rr-fee {
    font-size: 0.56rem;
    color: var(--text-dim);
    opacity: 0.55;
    display: flex;
    align-items: center;
    gap: 0.1rem;
  }
  .rr-fee input {
    font-family: 'DM Mono', monospace;
    font-size: 0.56rem;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 3px;
    width: 2.4rem;
    padding: 0.08rem 0.15rem;
    outline: none;
    text-align: center;
    transition: all 0.2s;
    -moz-appearance: textfield;
  }
  .rr-fee input:focus {
    background: var(--input-bg);
    border-color: var(--accent-card);
    color: var(--text);
    opacity: 1;
  }

  .rr-rate-edit {
    display: flex;
    align-items: center;
    gap: 0.15rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    opacity: 0.8;
  }
  .rr-rate-edit input {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    width: 5.2rem;
    padding: 0.12rem 0.2rem;
    outline: none;
    transition: all 0.2s;
    -moz-appearance: textfield;
  }
  .rr-rate-edit input:focus {
    background: var(--input-bg);
    border-color: var(--accent-blue);
    color: var(--text);
    opacity: 1;
  }
  .card-side .rr-rate-edit input:focus { border-color: var(--accent-card); }
  .cash-side .rr-rate-edit input:focus { border-color: var(--accent-cash); }

  .rr-sub {
    font-size: 0.56rem;
    color: var(--text-dim);
    opacity: 0.45;
  }

  .rr-divider { height: 1px; background: var(--card-border); margin: 0.15rem 0; }

  .rr-result {
    font-family: 'DM Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.15;
    transition: transform 0.15s ease;
  }
  .rr-result.pop { transform: scale(1.06); }
  .card-side .rr-result { color: var(--accent-card); }
  .cash-side .rr-result { color: var(--accent-cash); }

  .rr-unit { font-size: 0.62rem; color: var(--text-dim); }

  .diff-note {
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-dim);
    min-height: 1.2em;
  }
  .diff-note span { color: var(--accent-cash); font-weight: 600; }

  /* Note Input */
  .note-input {
    font-family: 'Noto Sans TC', sans-serif !important;
    font-size: 0.82rem !important;
    background: var(--card) !important;
    border: 1px solid var(--card-border) !important;
    border-radius: 10px !important;
    padding: 0.55rem 0.9rem !important;
  }
  .note-input::placeholder { color: var(--text-dim); opacity: 0.45; }
  .note-input:focus { border-color: var(--accent-blue) !important; }

  /* Action Buttons */
  .action-row { display: flex; gap: 0.6rem; }

  .btn {
    flex: 1;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.7rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-add { background: var(--accent-blue); color: #fff; }
  .btn-add:active { background: #2980b9; }
  .btn-reset {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
  }
  .btn-reset:active { background: rgba(231,76,60,0.15); color: var(--accent-card); border-color: var(--accent-card); }

  /* Summary */
  .summary-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1rem 1.1rem;
  }
  .summary-title {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .summary-item { text-align: center; }
  .summary-label { font-size: 0.66rem; color: var(--text-dim); margin-bottom: 0.2rem; }
  .summary-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 600;
    transition: transform 0.15s;
  }
  .summary-value.card-color { color: var(--accent-card); }
  .summary-value.cash-color { color: var(--accent-cash); }
  .summary-count {
    text-align: center;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--card-border);
  }

  /* History */
  .history-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.1rem;
    border-bottom: 1px solid var(--card-border);
  }
  .history-title {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .btn-clear-history {
    font-size: 0.66rem;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-clear-history:active { color: var(--accent-card); }

  .history-list { max-height: 300px; overflow-y: auto; }

  .history-item {
    display: flex;
    align-items: center;
    padding: 0.55rem 0.5rem 0.55rem 1.1rem;
    border-bottom: 1px solid rgba(42,63,85,0.5);
    gap: 0.35rem;
  }
  .history-item:last-child { border-bottom: none; }

  .history-left {
    display: flex;
    flex-direction: column;
    gap: 0.1rem;
    min-width: 0;
    flex-shrink: 0;
  }
  .history-from {
    font-family: 'DM Mono', monospace;
    font-size: 0.74rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .history-note {
    font-size: 0.6rem;
    color: var(--accent-blue);
    opacity: 0.8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 7rem;
  }

  .history-twd {
    display: flex;
    gap: 0.35rem;
    flex: 1;
    justify-content: flex-end;
    flex-shrink: 0;
  }
  .history-card-val { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent-card); }
  .history-cash-val { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--accent-cash); }
  .history-time { font-size: 0.56rem; color: var(--text-dim); opacity: 0.6; flex-shrink: 0; }

  .history-del {
    font-size: 0.7rem;
    color: var(--text-dim);
    opacity: 0.3;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.3rem;
    flex-shrink: 0;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1;
  }
  .history-del:active { opacity: 1; color: var(--accent-card); }

  .history-empty {
    padding: 1.4rem;
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-dim);
    opacity: 0.5;
  }

  footer { margin-top: 2rem; font-size: 0.65rem; color: var(--text-dim); text-align: center; opacity: 0.5; line-height: 1.6; }

  @media (hover: hover) {
    .history-del:hover { opacity: 1; color: var(--accent-card); }
  }
</style>
</head>
<body>

<header>
  <h1>旅遊換匯計算機</h1>
  <p id="updateTime">載入匯率中⋯</p>
</header>

<div class="container">

  <div class="currency-tabs" id="currencyTabs"></div>

  <div class="input-group">
    <label id="inputLabel">韓幣金額 (₩)</label>
    <div class="input-row">
      <span class="currency-tag" id="currencyTag">₩ KRW</span>
      <input type="number" id="amount" placeholder="例: 15000" inputmode="numeric">
    </div>
  </div>

  <!-- Rate + Result -->
  <div class="rr-grid">
    <!-- Card -->
    <div class="rr-box card-side">
      <div class="rr-label-row">
        <span class="rr-label">💳 刷卡</span>
        <div class="mode-toggle" id="cardModeToggle" data-target="card">
          <button class="mode-btn active" data-mode="auto">自動</button>
          <button class="mode-btn" data-mode="manual">手動</button>
        </div>
      </div>
      <div id="cardAutoSection">
        <div class="rr-rate" id="cardRateDisplay">× —</div>
        <div class="rr-fee">含 <input type="number" id="cardFee" value="1.5" step="0.1" min="0" max="10">% 手續費</div>
      </div>
      <div id="cardManualSection" style="display:none">
        <div class="rr-rate-edit">× <input type="number" id="cardManualInput" step="any"></div>
        <div class="rr-sub">可自訂匯率</div>
      </div>
      <div class="rr-divider"></div>
      <div class="rr-result" id="cardResult">—</div>
      <div class="rr-unit">新台幣 TWD</div>
    </div>
    <!-- Cash -->
    <div class="rr-box cash-side">
      <div class="rr-label-row">
        <span class="rr-label">💵 現金</span>
        <div class="mode-toggle" id="cashModeToggle" data-target="cash">
          <button class="mode-btn" data-mode="auto">自動</button>
          <button class="mode-btn active" data-mode="manual">手動</button>
        </div>
      </div>
      <div id="cashAutoSection" style="display:none">
        <div class="rr-rate" id="cashAutoRateDisplay">× —</div>
        <div class="rr-sub">即時中間價</div>
      </div>
      <div id="cashManualSection">
        <div class="rr-rate-edit">× <input type="number" id="cashManualInput" step="any"></div>
        <div class="rr-sub">可自訂匯率</div>
      </div>
      <div class="rr-divider"></div>
      <div class="rr-result" id="cashResult">—</div>
      <div class="rr-unit">新台幣 TWD</div>
    </div>
  </div>

  <div class="diff-note" id="diffNote"></div>

  <!-- Note + Actions -->
  <input type="text" id="noteInput" class="note-input" placeholder="備註（選填）例：晚餐、交通、紀念品" maxlength="20">

  <div class="action-row">
    <button class="btn btn-add" id="btnAdd">＋ 加入統計</button>
    <button class="btn btn-reset" id="btnReset">🔄 重製全部</button>
  </div>

  <!-- Summary -->
  <div class="summary-box">
    <div class="summary-title">📊 加總統計</div>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">💳 刷卡總計</div>
        <div class="summary-value card-color" id="totalCard">NT$ 0</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">💵 現金總計</div>
        <div class="summary-value cash-color" id="totalCash">NT$ 0</div>
      </div>
    </div>
    <div class="summary-count" id="summaryCount">尚未加入任何項目</div>
  </div>

  <!-- History -->
  <div class="history-box">
    <div class="history-header">
      <span class="history-title">🕘 歷史紀錄</span>
      <button class="btn-clear-history" id="btnClearHistory">清除全部</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">尚無紀錄</div>
    </div>
  </div>

</div>

<footer>旅遊換匯計算機 · 匯率來源 fxapi.app · 僅供參考</footer>

<script>
var CURRENCIES = {
  KRW: { name: '韓幣',   symbol: '₩',  flag: '🇰🇷', defaultCash: 0.02310, placeholder: '15000' },
  JPY: { name: '日幣',   symbol: '¥',  flag: '🇯🇵', defaultCash: 0.2200,  placeholder: '1000' },
  USD: { name: '美金',   symbol: '$',  flag: '🇺🇸', defaultCash: 32.00,   placeholder: '100' },
  THB: { name: '泰銖',   symbol: '฿',  flag: '🇹🇭', defaultCash: 0.92,    placeholder: '1000' },
  VND: { name: '越南盾', symbol: '₫',  flag: '🇻🇳', defaultCash: 0.00130, placeholder: '100000' },
  EUR: { name: '歐元',   symbol: '€',  flag: '🇪🇺', defaultCash: 35.50,   placeholder: '100' },
  CZK: { name: '捷克克朗', symbol: 'Kč', flag: '🇨🇿', defaultCash: 1.50,  placeholder: '1000' }
};

var FALLBACK_API = { KRW: 47.77, JPY: 5.07, USD: 0.0318, THB: 1.08, VND: 819.67, EUR: 0.0294, CZK: 0.73 };

function $(id) { return document.getElementById(id); }

var updateTimeEl      = $('updateTime');
var currencyTabsEl    = $('currencyTabs');
var inputLabelEl      = $('inputLabel');
var currencyTagEl     = $('currencyTag');
var amountInput       = $('amount');
var cardRateDisplay   = $('cardRateDisplay');
var cardFeeInput      = $('cardFee');
var cardManualInput   = $('cardManualInput');
var cashAutoRateDisplay = $('cashAutoRateDisplay');
var cashManualInput   = $('cashManualInput');
var cardResultEl      = $('cardResult');
var cashResultEl      = $('cashResult');
var diffNoteEl        = $('diffNote');
var noteInput         = $('noteInput');
var totalCardEl       = $('totalCard');
var totalCashEl       = $('totalCash');
var summaryCountEl    = $('summaryCount');
var historyListEl     = $('historyList');

// State — restore from localStorage
var activeCurrency, manualCashRates, manualCardRates, cardModes, cashModes, cardFee;
try {
  activeCurrency  = localStorage.getItem('activeCurrency') || 'KRW';
  manualCashRates = JSON.parse(localStorage.getItem('manualCashRates') || '{}');
  manualCardRates = JSON.parse(localStorage.getItem('manualCardRates') || '{}');
  cardModes       = JSON.parse(localStorage.getItem('cardModes') || '{}');
  cashModes       = JSON.parse(localStorage.getItem('cashModes') || '{}');
  cardFee         = parseFloat(localStorage.getItem('cardFee'));
  if (isNaN(cardFee)) cardFee = 1.5;
} catch (e) {
  activeCurrency = 'KRW'; manualCashRates = {}; manualCardRates = {};
  cardModes = {}; cashModes = {}; cardFee = 1.5;
}

var apiRates = null;
var historyLog = [];
var totalCard = 0, totalCash = 0;
var currentCard = 0, currentCash = 0;

function save(k, v) { try { localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v)); } catch(e){} }

function fmt(n) {
  if (!n) return '—';
  return n.toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
}

function fmtRate(r) {
  if (!r) return '—';
  if (r >= 100) return r.toFixed(1);
  if (r >= 10)  return r.toFixed(2);
  if (r >= 1)   return r.toFixed(3);
  if (r >= 0.01) return r.toFixed(4);
  return r.toFixed(5);
}

function popAnim(el) {
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(function() { el.classList.remove('pop'); }, 180);
}

function getApiRate(code) { return (apiRates && apiRates[code]) || FALLBACK_API[code] || 1; }

function getCardMode(code) { return cardModes[code] || 'auto'; }
function getCashMode(code) { return cashModes[code] || 'manual'; }

function autoCardRate(code) { return (1 / getApiRate(code)) * (1 + cardFee / 100); }
function autoCashRate(code) { return 1 / getApiRate(code); }

function getActiveCardRate(code) {
  if (getCardMode(code) === 'manual') {
    return manualCardRates[code] != null ? manualCardRates[code] : autoCardRate(code);
  }
  return autoCardRate(code);
}

function getActiveCashRate(code) {
  if (getCashMode(code) === 'auto') return autoCashRate(code);
  return manualCashRates[code] != null ? manualCashRates[code] : (CURRENCIES[code] ? CURRENCIES[code].defaultCash : 0);
}

// API
function fetchRates() {
  fetch('https://fxapi.app/api/TWD.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      apiRates = data.rates;
      var ts = new Date(data.timestamp);
      updateTimeEl.textContent = '匯率更新: ' + ts.toLocaleString('zh-TW', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
      refreshRateDisplay();
      calculate();
    })
    .catch(function() {
      apiRates = null;
      updateTimeEl.textContent = '⚠️ 離線模式，使用預設匯率';
      refreshRateDisplay();
      calculate();
    });
}

// Tabs
function renderTabs() {
  currencyTabsEl.innerHTML = '';
  var codes = Object.keys(CURRENCIES);
  for (var i = 0; i < codes.length; i++) {
    var code = codes[i];
    var c = CURRENCIES[code];
    var tab = document.createElement('div');
    tab.className = 'currency-tab' + (code === activeCurrency ? ' active' : '');
    tab.dataset.code = code;
    tab.innerHTML = c.flag + ' ' + code + ' <span class="tab-name">' + c.name + '</span>';
    tab.addEventListener('click', (function(cd) { return function() { switchCurrency(cd); }; })(code));
    currencyTabsEl.appendChild(tab);
  }
}

function switchCurrency(code) {
  if (code === activeCurrency) return;
  activeCurrency = code;
  save('activeCurrency', code);
  amountInput.value = '';
  noteInput.value = '';
  currentCard = 0; currentCash = 0;
  cardResultEl.textContent = '—';
  cashResultEl.textContent = '—';
  diffNoteEl.innerHTML = '';
  refreshCurrencyUI();
  renderTabs();
}

function refreshCurrencyUI() {
  var c = CURRENCIES[activeCurrency];
  inputLabelEl.textContent = c.name + '金額 (' + c.symbol + ')';
  currencyTagEl.textContent = c.symbol + ' ' + activeCurrency;
  amountInput.placeholder = '例: ' + c.placeholder;
  refreshModeUI();
  refreshRateDisplay();
}

// Mode toggle
function setMode(target, mode) {
  var code = activeCurrency;
  if (target === 'card') {
    if (mode === 'manual' && manualCardRates[code] == null) {
      manualCardRates[code] = parseFloat(autoCardRate(code).toFixed(6));
      save('manualCardRates', manualCardRates);
    }
    cardModes[code] = mode;
    save('cardModes', cardModes);
  } else {
    if (mode === 'auto') {
      // switching cash to auto
    } else if (manualCashRates[code] == null) {
      manualCashRates[code] = CURRENCIES[code].defaultCash;
      save('manualCashRates', manualCashRates);
    }
    cashModes[code] = mode;
    save('cashModes', cashModes);
  }
  refreshModeUI();
  refreshRateDisplay();
  calculate();
}

function refreshModeUI() {
  var cm = getCardMode(activeCurrency);
  var sm = getCashMode(activeCurrency);

  $('cardModeToggle').querySelectorAll('.mode-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.mode === cm);
  });
  $('cashModeToggle').querySelectorAll('.mode-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.mode === sm);
  });

  $('cardAutoSection').style.display   = cm === 'auto'   ? '' : 'none';
  $('cardManualSection').style.display  = cm === 'manual' ? '' : 'none';
  $('cashAutoSection').style.display    = sm === 'auto'   ? '' : 'none';
  $('cashManualSection').style.display  = sm === 'manual' ? '' : 'none';
}

function refreshRateDisplay() {
  var code = activeCurrency;
  var cm = getCardMode(code);
  var sm = getCashMode(code);

  if (cm === 'auto') {
    cardRateDisplay.textContent = '× ' + fmtRate(autoCardRate(code));
    cardFeeInput.value = cardFee;
  } else {
    var mcr = manualCardRates[code] != null ? manualCardRates[code] : autoCardRate(code);
    cardManualInput.value = fmtRate(mcr);
  }

  if (sm === 'auto') {
    cashAutoRateDisplay.textContent = '× ' + fmtRate(autoCashRate(code));
  } else {
    var msr = manualCashRates[code] != null ? manualCashRates[code] : CURRENCIES[code].defaultCash;
    cashManualInput.value = fmtRate(msr);
  }
}

// Calculate
function calculate() {
  var val = parseFloat(amountInput.value) || 0;
  var cr = getActiveCardRate(activeCurrency);
  var ca = getActiveCashRate(activeCurrency);

  currentCard = val * cr;
  currentCash = val * ca;

  cardResultEl.textContent = val ? fmt(currentCard) : '—';
  cashResultEl.textContent = val ? fmt(currentCash) : '—';

  if (val && cr && ca) {
    var diff = Math.abs(currentCard - currentCash);
    var cheaper = currentCard < currentCash ? '刷卡' : '現金';
    diffNoteEl.innerHTML = cheaper + '較便宜，省 <span>NT$ ' + fmt(diff) + '</span>';
  } else {
    diffNoteEl.innerHTML = '';
  }
  popAnim(cardResultEl);
  popAnim(cashResultEl);
}

// Add to total
function addToTotal() {
  var val = parseFloat(amountInput.value) || 0;
  if (!val) return;

  totalCard += currentCard;
  totalCash += currentCash;

  var now = new Date();
  var timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  var c = CURRENCIES[activeCurrency];
  var note = noteInput.value.trim();

  historyLog.unshift({
    code: activeCurrency, flag: c.flag, symbol: c.symbol,
    amount: val, card: currentCard, cash: currentCash,
    time: timeStr, note: note
  });

  noteInput.value = '';
  updateSummary();
  renderHistory();

  totalCardEl.style.transform = 'scale(1.08)';
  totalCashEl.style.transform = 'scale(1.08)';
  setTimeout(function() { totalCardEl.style.transform = ''; totalCashEl.style.transform = ''; }, 200);
}

function deleteHistoryItem(index) {
  var item = historyLog[index];
  totalCard -= item.card;
  totalCash -= item.cash;
  if (totalCard < 0) totalCard = 0;
  if (totalCash < 0) totalCash = 0;
  historyLog.splice(index, 1);
  updateSummary();
  renderHistory();
}

function updateSummary() {
  totalCardEl.textContent = 'NT$ ' + (totalCard ? fmt(totalCard) : '0');
  totalCashEl.textContent = 'NT$ ' + (totalCash ? fmt(totalCash) : '0');
  if (historyLog.length) {
    summaryCountEl.textContent = '共 ' + historyLog.length + ' 筆';
  } else {
    summaryCountEl.textContent = '尚未加入任何項目';
  }
}

function renderHistory() {
  if (!historyLog.length) {
    historyListEl.innerHTML = '<div class="history-empty">尚無紀錄</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < historyLog.length; i++) {
    var h = historyLog[i];
    var noteHtml = h.note ? '<span class="history-note">' + escHtml(h.note) + '</span>' : '';
    html += '<div class="history-item">' +
      '<div class="history-left">' +
        '<span class="history-from">' + h.flag + ' ' + h.symbol + fmt(h.amount) + '</span>' +
        noteHtml +
      '</div>' +
      '<div class="history-twd">' +
        '<span class="history-card-val">💳 ' + fmt(h.card) + '</span>' +
        '<span class="history-cash-val">💵 ' + fmt(h.cash) + '</span>' +
      '</div>' +
      '<span class="history-time">' + h.time + '</span>' +
      '<button class="history-del" data-idx="' + i + '">✕</button>' +
    '</div>';
  }
  historyListEl.innerHTML = html;

  historyListEl.querySelectorAll('.history-del').forEach(function(btn) {
    btn.addEventListener('click', function() {
      deleteHistoryItem(parseInt(this.dataset.idx));
    });
  });
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function clearHistory() {
  historyLog = [];
  totalCard = 0; totalCash = 0;
  updateSummary();
  renderHistory();
}

function resetAll() {
  amountInput.value = '';
  noteInput.value = '';
  currentCard = 0; currentCash = 0;
  cardResultEl.textContent = '—';
  cashResultEl.textContent = '—';
  diffNoteEl.innerHTML = '';
  clearHistory();
}

// Event listeners
amountInput.addEventListener('input', calculate);

cardManualInput.addEventListener('input', function() {
  var v = parseFloat(cardManualInput.value);
  if (v > 0) {
    manualCardRates[activeCurrency] = v;
    save('manualCardRates', manualCardRates);
    calculate();
  }
});

cashManualInput.addEventListener('input', function() {
  var v = parseFloat(cashManualInput.value);
  if (v > 0) {
    manualCashRates[activeCurrency] = v;
    save('manualCashRates', manualCashRates);
    calculate();
  }
});

cardFeeInput.addEventListener('input', function() {
  var v = parseFloat(cardFeeInput.value);
  cardFee = isNaN(v) ? 0 : v;
  save('cardFee', String(cardFee));
  refreshRateDisplay();
  calculate();
});

document.querySelectorAll('.mode-toggle').forEach(function(toggle) {
  toggle.addEventListener('click', function(e) {
    var btn = e.target.closest('.mode-btn');
    if (!btn) return;
    setMode(toggle.dataset.target, btn.dataset.mode);
  });
});

$('btnAdd').addEventListener('click', addToTotal);
$('btnReset').addEventListener('click', resetAll);
$('btnClearHistory').addEventListener('click', clearHistory);

// Init
renderTabs();
refreshCurrencyUI();
fetchRates();
</script>

</body>
</html>
