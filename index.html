<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韓幣 → 台幣 換算器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1923;
    --card: #1a2a3a;
    --card-border: #2a3f55;
    --accent-card: #e74c3c;
    --accent-cash: #2ecc71;
    --accent-blue: #3498db;
    --text: #e8edf2;
    --text-dim: #7f95a8;
    --input-bg: #0d1520;
    --input-border: #2a3f55;
    --input-focus: #3498db;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1.2rem 1rem 3rem;
  }

  header { text-align: center; margin-bottom: 1.4rem; }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 0.25rem; }
  header h1 span.flag { font-size: 1.3rem; }
  header p { font-size: 0.8rem; color: var(--text-dim); }

  .container { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 0.9rem; }

  /* 金額輸入 */
  .input-group {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1rem 1.1rem;
  }

  .input-group label {
    display: block;
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 0.45rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .input-row { display: flex; align-items: center; gap: 0.6rem; }

  .currency-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    color: var(--text-dim);
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    padding: 0.6rem 0.65rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  input[type="number"] {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 1.2rem;
    color: var(--text);
    background: var(--input-bg);
    border: 1.5px solid var(--input-border);
    border-radius: 10px;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }

  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input:focus { border-color: var(--input-focus); }

  /* 匯率 + 結果 合併格子 */
  .rr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }

  .rr-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 0.8rem 0.9rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .rr-box.card-side { border-left: 3px solid var(--accent-card); }
  .rr-box.cash-side { border-left: 3px solid var(--accent-cash); }

  .rr-label { font-size: 0.68rem; font-weight: 600; color: var(--text-dim); }

  .rr-rate {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text-dim);
    opacity: 0.8;
  }

  .rr-divider { height: 1px; background: var(--card-border); margin: 0.15rem 0; }

  .rr-result {
    font-family: 'DM Mono', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    line-height: 1.15;
    transition: transform 0.15s ease;
  }

  .rr-result.pop { transform: scale(1.06); }
  .card-side .rr-result { color: var(--accent-card); }
  .cash-side .rr-result { color: var(--accent-cash); }

  .rr-unit { font-size: 0.62rem; color: var(--text-dim); }

  .diff-note {
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-dim);
    min-height: 1.2em;
  }
  .diff-note span { color: var(--accent-cash); font-weight: 600; }

  /* 操作按鈕 */
  .action-row { display: flex; gap: 0.6rem; }

  .btn {
    flex: 1;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.7rem;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-add { background: var(--accent-blue); color: #fff; }
  .btn-add:active { background: #2980b9; }

  .btn-reset {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
  }
  .btn-reset:active { background: rgba(231,76,60,0.15); color: var(--accent-card); border-color: var(--accent-card); }

  /* 加總統計 */
  .summary-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1rem 1.1rem;
  }

  .summary-title {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .summary-item { text-align: center; }
  .summary-label { font-size: 0.66rem; color: var(--text-dim); margin-bottom: 0.2rem; }

  .summary-value {
    font-family: 'DM Mono', monospace;
    font-size: 1.05rem;
    font-weight: 600;
    transition: transform 0.15s;
  }

  .summary-value.card-color { color: var(--accent-card); }
  .summary-value.cash-color { color: var(--accent-cash); }

  .summary-count {
    text-align: center;
    font-size: 0.68rem;
    color: var(--text-dim);
    margin-top: 0.6rem;
    padding-top: 0.6rem;
    border-top: 1px solid var(--card-border);
  }

  /* 歷史紀錄 */
  .history-box {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    overflow: hidden;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.8rem 1.1rem;
    border-bottom: 1px solid var(--card-border);
  }

  .history-title {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .btn-clear-history {
    font-size: 0.66rem;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
  }
  .btn-clear-history:active { color: var(--accent-card); }

  .history-list { max-height: 240px; overflow-y: auto; }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.65rem 1.1rem;
    border-bottom: 1px solid rgba(42,63,85,0.5);
    gap: 0.5rem;
  }

  .history-item:last-child { border-bottom: none; }

  .history-krw {
    font-family: 'DM Mono', monospace;
    font-size: 0.84rem;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .history-twd { display: flex; gap: 0.5rem; flex: 1; justify-content: flex-end; }

  .history-card-val { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--accent-card); }
  .history-cash-val { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--accent-cash); }

  .history-time { font-size: 0.6rem; color: var(--text-dim); opacity: 0.6; flex-shrink: 0; }

  .history-empty {
    padding: 1.4rem;
    text-align: center;
    font-size: 0.76rem;
    color: var(--text-dim);
    opacity: 0.5;
  }

  footer { margin-top: 2rem; font-size: 0.68rem; color: var(--text-dim); text-align: center; opacity: 0.5; }
</style>
</head>
<body>

<header>
  <h1><span class="flag">🇰🇷</span> 韓幣 → 台幣 <span class="flag">🇹🇼</span></h1>
  <p>即時換算刷卡 / 現金台幣價格</p>
</header>

<div class="container">

  <!-- 金額輸入 -->
  <div class="input-group">
    <label>韓幣金額 (₩)</label>
    <div class="input-row">
      <span class="currency-tag">₩ KRW</span>
      <input type="number" id="krwAmount" placeholder="例: 15000" inputmode="numeric">
    </div>
  </div>

  <!-- 匯率 + 結果 合併 -->
  <div class="rr-grid">
    <div class="rr-box card-side">
      <div class="rr-label">💳 刷卡</div>
      <div class="rr-rate">× 0.02139</div>
      <div class="rr-divider"></div>
      <div class="rr-result" id="cardResult">—</div>
      <div class="rr-unit">新台幣 TWD</div>
    </div>
    <div class="rr-box cash-side">
      <div class="rr-label">💵 現金</div>
      <div class="rr-rate">× 0.02310</div>
      <div class="rr-divider"></div>
      <div class="rr-result" id="cashResult">—</div>
      <div class="rr-unit">新台幣 TWD</div>
    </div>
  </div>

  <div class="diff-note" id="diffNote"></div>

  <!-- 操作按鈕 -->
  <div class="action-row">
    <button class="btn btn-add" onclick="addToTotal()">＋ 加入統計</button>
    <button class="btn btn-reset" onclick="resetAll()">🔄 重製全部</button>
  </div>

  <!-- 加總統計 -->
  <div class="summary-box">
    <div class="summary-title">📊 加總統計</div>
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">💳 刷卡總計</div>
        <div class="summary-value card-color" id="totalCard">NT$ 0</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">💵 現金總計</div>
        <div class="summary-value cash-color" id="totalCash">NT$ 0</div>
      </div>
    </div>
    <div class="summary-count" id="summaryCount">尚未加入任何項目</div>
  </div>

  <!-- 歷史紀錄 -->
  <div class="history-box">
    <div class="history-header">
      <span class="history-title">🕘 歷史紀錄</span>
      <button class="btn-clear-history" onclick="clearHistory()">清除紀錄</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">尚無紀錄</div>
    </div>
  </div>

</div>

<footer>KRW → TWD 換算工具 · 匯率僅供參考</footer>

<script>
const krwInput    = document.getElementById('krwAmount');
const cardResultEl = document.getElementById('cardResult');
const cashResultEl = document.getElementById('cashResult');
const diffNote    = document.getElementById('diffNote');
const totalCardEl = document.getElementById('totalCard');
const totalCashEl = document.getElementById('totalCash');
const summaryCountEl = document.getElementById('summaryCount');
const historyListEl  = document.getElementById('historyList');

const CARD_RATE = 0.02139;
const CASH_RATE = 0.02310;

let historyLog = [];
let totalCard = 0, totalCash = 0;
let currentCard = 0, currentCash = 0;

function popAnim(el) {
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 180);
}

function fmt(num) {
  if (!num) return '—';
  return num.toLocaleString('zh-TW', { minimumFractionDigits: 0, maximumFractionDigits: 1 });
}

function calculate() {
  const krw = parseFloat(krwInput.value) || 0;
  currentCard = krw * CARD_RATE;
  currentCash = krw * CASH_RATE;

  cardResultEl.textContent = krw ? fmt(currentCard) : '—';
  cashResultEl.textContent = krw ? fmt(currentCash) : '—';

  if (krw) {
    const diff = Math.abs(currentCard - currentCash);
    const cheaper = currentCard < currentCash ? '刷卡' : '現金';
    diffNote.innerHTML = `${cheaper}較便宜，省 <span>NT$ ${fmt(diff)}</span>`;
  } else {
    diffNote.innerHTML = '';
  }

  popAnim(cardResultEl);
  popAnim(cashResultEl);
}

function addToTotal() {
  const krw = parseFloat(krwInput.value) || 0;
  if (!krw) return;

  totalCard += currentCard;
  totalCash += currentCash;

  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  historyLog.unshift({ krw, card: currentCard, cash: currentCash, time: timeStr });

  updateSummary();
  renderHistory();

  totalCardEl.style.transform = 'scale(1.08)';
  totalCashEl.style.transform = 'scale(1.08)';
  setTimeout(() => { totalCardEl.style.transform = ''; totalCashEl.style.transform = ''; }, 200);
}

function updateSummary() {
  totalCardEl.textContent = `NT$ ${fmt(totalCard)}`;
  totalCashEl.textContent = `NT$ ${fmt(totalCash)}`;
  const krwSum = historyLog.reduce((a, b) => a + b.krw, 0);
  summaryCountEl.textContent = `共 ${historyLog.length} 筆 · 合計 ₩${fmt(krwSum)}`;
}

function renderHistory() {
  if (!historyLog.length) {
    historyListEl.innerHTML = '<div class="history-empty">尚無紀錄</div>';
    return;
  }
  historyListEl.innerHTML = historyLog.map(h => `
    <div class="history-item">
      <span class="history-krw">₩${fmt(h.krw)}</span>
      <div class="history-twd">
        <span class="history-card-val">💳 ${fmt(h.card)}</span>
        <span class="history-cash-val">💵 ${fmt(h.cash)}</span>
      </div>
      <span class="history-time">${h.time}</span>
    </div>
  `).join('');
}

function clearHistory() {
  historyLog = [];
  totalCard = 0; totalCash = 0;
  totalCardEl.textContent = 'NT$ 0';
  totalCashEl.textContent = 'NT$ 0';
  summaryCountEl.textContent = '尚未加入任何項目';
  renderHistory();
}

function resetAll() {
  krwInput.value = '';
  currentCard = 0; currentCash = 0;
  cardResultEl.textContent = '—';
  cashResultEl.textContent = '—';
  diffNote.innerHTML = '';
  clearHistory();
}

krwInput.addEventListener('input', calculate);
</script>

</body>
</html>
